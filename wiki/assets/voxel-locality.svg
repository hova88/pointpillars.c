<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img">
  <title>Sparse voxelization memory locality</title>
  <desc>The persistent grid maps spatial cells to compact pillar rows, while only touched pillar feature blocks are cleared.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3 0 6Z" fill="#f59e0b"/></marker><pattern id="h" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(40)"><line y2="9" stroke="#637083" stroke-width="2"/></pattern><style>.t{fill:#e8edf2;font:21px system-ui}.m{fill:#a7b2c1;font:16px ui-monospace,monospace}.a{stroke:#f59e0b;stroke-width:4;fill:none;marker-end:url(#a)}</style></defs>
  <rect width="1200" height="675" fill="#0b0d10"/><text x="55" y="62" class="t" font-size="30">Clear what is live, not what is possible</text>
  <g transform="translate(70 130)"><rect width="390" height="390" fill="#11151b" stroke="#a855f7" stroke-width="3" rx="16"/><text x="195" y="-22" text-anchor="middle" class="m">persistent 512 × 512 int32 grid · 1 MiB</text>
    <g stroke="#303947" stroke-width="2"><path d="M65 0V390M130 0V390M195 0V390M260 0V390M325 0V390M0 65H390M0 130H390M0 195H390M0 260H390M0 325H390"/></g>
    <rect x="68" y="198" width="59" height="59" fill="#22d3ee"/><rect x="263" y="68" width="59" height="59" fill="#84cc16"/><rect x="198" y="263" width="59" height="59" fill="#f59e0b"/>
    <text x="97" y="234" text-anchor="middle" class="m">17</text><text x="292" y="104" text-anchor="middle" class="m">18</text><text x="227" y="299" text-anchor="middle" class="m">19</text>
  </g>
  <path d="M465 325 C540 325 540 245 625 245" class="a"/><text x="520" y="294" class="m">cell → pillar index</text>
  <g transform="translate(625 120)"><text x="225" y="-12" text-anchor="middle" class="m">feature arena · max 30,000 × 20 × 11 fp32</text>
    <rect width="450" height="430" fill="#11151b" stroke="#22d3ee" stroke-width="3" rx="16"/>
    <rect x="35" y="40" width="380" height="82" fill="#123442" stroke="#22d3ee"/><text x="55" y="73" class="t">pillar 17</text><text x="55" y="101" class="m">clear 880 B, then append points</text>
    <rect x="35" y="140" width="380" height="82" fill="#233414" stroke="#84cc16"/><text x="55" y="173" class="t">pillar 18</text><text x="55" y="201" class="m">20 contiguous 11-float records</text>
    <rect x="35" y="240" width="380" height="82" fill="#3c2910" stroke="#f59e0b"/><text x="55" y="273" class="t">pillar 19</text><text x="55" y="301" class="m">mean + cluster + center offsets</text>
    <rect x="35" y="340" width="380" height="55" fill="url(#h)" stroke="#637083"/><text x="225" y="374" text-anchor="middle" class="m">untouched capacity: no writes this frame</text>
  </g>
  <text x="70" y="600" class="t">Old cost</text><text x="170" y="600" class="m">25.18 MiB memset + 1 MiB grid reset / frame</text>
  <text x="70" y="635" class="t">Current cost</text><text x="205" y="635" class="m">O(live pillars) feature clears + O(previous pillars) grid undo</text>
</svg>
