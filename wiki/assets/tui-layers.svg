<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img"><title>Terminal visualizer compositing layers</title><desc>Metric grid, point heights, tracks, boxes, velocities, selection, and status are composed into Braille cells with bounded state.</desc><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3 0 6Z" fill="#f59e0b"/></marker><style>.t{fill:#e8edf2;font:21px system-ui}.m{fill:#a7b2c1;font:16px ui-monospace,monospace}.a{stroke:#f59e0b;stroke-width:4;fill:none;marker-end:url(#a)}</style></defs><rect width="1200" height="675" fill="#0b0d10"/><text x="55" y="62" class="t" font-size="30">A terminal cell is a tiny 2 × 4 framebuffer</text>
<g transform="translate(70 130)"><rect width="390" height="420" rx="20" fill="#11151b" stroke="#637083" stroke-width="3"/><g stroke="#303947" stroke-width="2"><path d="M65 0V420M130 0V420M195 0V420M260 0V420M325 0V420M0 70H390M0 140H390M0 210H390M0 280H390M0 350H390"/></g><path d="M25 320C80 250 125 280 180 200S290 145 360 80" stroke="#22d3ee" stroke-width="7" fill="none" stroke-linecap="round"/><rect x="210" y="175" width="105" height="58" transform="rotate(-18 262 204)" fill="none" stroke="#f59e0b" stroke-width="6"/><path d="M262 204L330 150" stroke="#84cc16" stroke-width="5"/><path d="M90 290L150 245L210 215" stroke="#a855f7" stroke-width="5" stroke-dasharray="9 7"/></g>
<path d="M460 340H575" class="a"/><g transform="translate(575 150)"><text x="210" y="-20" text-anchor="middle" class="t">priority raster</text><rect width="420" height="390" rx="20" fill="#11151b" stroke="#22d3ee" stroke-width="3"/><g class="m"><text x="35" y="55">1  metric grid</text><text x="35" y="100" fill="#22d3ee">2  ordinary point</text><text x="35" y="145" fill="#84cc16">3  elevated point</text><text x="35" y="190" fill="#f59e0b">10…19  class box / trail</text><text x="35" y="235">30  ego / selected object</text></g><rect x="275" y="52" width="42" height="82" fill="none" stroke="#637083" stroke-width="2"/><g fill="#e8edf2"><circle cx="287" cy="65" r="5"/><circle cx="305" cy="83" r="5"/><circle cx="287" cy="101" r="5"/><circle cx="305" cy="119" r="5"/></g><text x="296" y="165" text-anchor="middle" class="m">Braille mask</text><text x="210" y="310" text-anchor="middle" class="t">one canonical pp_detections</text><text x="210" y="340" text-anchor="middle" class="m">same boxes as JSON and evaluation</text></g>
