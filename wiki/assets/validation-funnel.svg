<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img"><title>Validation funnel from input checks to runtime equivalence</title><desc>Correctness evidence narrows from malformed input and operator fixtures through graph and decode equivalence.</desc><style>.t{fill:#e8edf2;font:21px system-ui}.m{fill:#a7b2c1;font:16px ui-monospace,monospace}</style><rect width="1200" height="675" fill="#0b0d10"/><text x="55" y="62" class="t" font-size="30">Fast is only meaningful inside a correctness funnel</text>
<g transform="translate(150 120)" stroke-width="3"><path d="M0 0H900L815 90H85Z" fill="#30151a" stroke="#ef4444"/><text x="450" y="40" text-anchor="middle" class="t">Container and input safety</text><text x="450" y="68" text-anchor="middle" class="m">bounds · CRC32 · truncation · stride · capacity</text>
<path d="M85 105H815L735 195H165Z" fill="#3c2910" stroke="#f59e0b"/><text x="450" y="145" text-anchor="middle" class="t">Focused C fixtures</text><text x="450" y="173" text-anchor="middle" class="m">model · voxel · decode · compact ABI · TUI tracks</text>
<path d="M165 210H735L665 300H235Z" fill="#321842" stroke="#a855f7"/><text x="450" y="250" text-anchor="middle" class="t">Raw graph equivalence</text><text x="450" y="278" text-anchor="middle" class="m">CPU ↔ precise CUDA ↔ PyTorch checkpoint oracle</text>
<path d="M235 315H665L600 405H300Z" fill="#123442" stroke="#22d3ee"/><text x="450" y="355" text-anchor="middle" class="t">Decode equivalence</text><text x="450" y="383" text-anchor="middle" class="m">81-frame compact/raw JSON byte identity</text>
<path d="M300 420H600L540 510H360Z" fill="#233414" stroke="#84cc16"/><text x="450" y="460" text-anchor="middle" class="t">Runtime behavior</text><text x="450" y="488" text-anchor="middle" class="m">batch · TUI · malformed-input failure paths</text></g>
<text x="600" y="650" text-anchor="middle" class="m">Each lower claim requires every layer above it; each claim stays within runtime scope.</text></svg>
