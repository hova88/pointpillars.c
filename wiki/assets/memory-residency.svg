<rect x="90" y="414" width="400" height="72" rx="12" fill="#233414" stroke="#84cc16"/><text x="110" y="445" class="t">decoded boxes</text><text x="110" y="471" class="m">≤830 canonical pp_box values</text>
<rect x="90" y="507" width="400" height="50" rx="12" fill="#3c2910" stroke="#f59e0b"/><text x="290" y="539" text-anchor="middle" class="m">≈10.5 KiB compact D2H / frame</text>
<rect x="675" y="115" width="470" height="475" rx="24" fill="#11151b" stroke="#84cc16" stroke-width="3"/><text x="710" y="158" class="t" font-size="26">Device DRAM</text>
