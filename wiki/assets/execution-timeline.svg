<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img"><title>Overlapped frame pipeline and CUDA event timeline</title><desc>A bounded CPU producer prepares the next frame while one continuous CUDA stream processes the current frame.</desc><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3 0 6Z" fill="#e8edf2"/></marker><style>.t{fill:#e8edf2;font:21px system-ui}.m{fill:#a7b2c1;font:16px ui-monospace,monospace}.axis{stroke:#e8edf2;stroke-width:3;marker-end:url(#a)}</style></defs><rect width="1200" height="675" fill="#0b0d10"/><text x="55" y="62" class="t" font-size="30">Two kinds of overlap: frames on CPU, stages on GPU</text><path d="M185 590H1135" class="axis"/><text x="1080" y="625" class="m">time →</text>
<text x="55" y="175" class="t">CPU producer</text><text x="55" y="315" class="t">GPU stream</text><text x="55" y="455" class="t">CPU decode</text>
<g stroke-width="3"><rect x="190" y="125" width="205" height="78" rx="13" fill="#123442" stroke="#22d3ee"/><rect x="420" y="125" width="190" height="78" rx="13" fill="#123442" stroke="#22d3ee"/><rect x="635" y="125" width="205" height="78" rx="13" fill="#123442" stroke="#22d3ee"/><text x="292" y="158" text-anchor="middle" class="t">load + voxel f₀</text><text x="292" y="184" text-anchor="middle" class="m">slot A</text><text x="515" y="158" text-anchor="middle" class="t">prepare f₁</text><text x="515" y="184" text-anchor="middle" class="m">slot B</text><text x="737" y="158" text-anchor="middle" class="t">prepare f₂</text><text x="737" y="184" text-anchor="middle" class="m">slot A</text>
<rect x="395" y="265" width="68" height="78" fill="#321842" stroke="#a855f7"/><rect x="463" y="265" width="355" height="78" fill="#233414" stroke="#84cc16"/><rect x="818" y="265" width="145" height="78" fill="#3c2910" stroke="#f59e0b"/><text x="429" y="310" text-anchor="middle" class="m">PFN</text><text x="640" y="310" text-anchor="middle" class="t">backbone</text><text x="890" y="310" text-anchor="middle" class="m">heads</text>
<line x1="395" y1="245" x2="395" y2="365" stroke="#637083" stroke-dasharray="7 7"/><line x1="463" y1="245" x2="463" y2="365" stroke="#637083" stroke-dasharray="7 7"/><line x1="818" y1="245" x2="818" y2="365" stroke="#637083" stroke-dasharray="7 7"/><line x1="963" y1="245" x2="963" y2="365" stroke="#637083" stroke-dasharray="7 7"/><text x="395" y="235" class="m">event 0</text><text x="463" y="382" class="m">event 1</text><text x="818" y="235" class="m">event 2</text><text x="963" y="382" class="m">event 3</text>
