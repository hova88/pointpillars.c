<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img"><title>Host and device memory residency</title><desc>Persistent weights and workspaces surround the narrow host-device boundary used by compact detection.</desc><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3 0 6Z" fill="#f59e0b"/></marker><style>.t{fill:#e8edf2;font:21px system-ui}.m{fill:#a7b2c1;font:16px ui-monospace,monospace}.a{stroke:#f59e0b;stroke-width:4;fill:none;marker-end:url(#a)}</style></defs><rect width="1200" height="675" fill="#0b0d10"/><text x="55" y="62" class="t" font-size="30">Residency is an optimization decision</text>
<rect x="55" y="115" width="470" height="475" rx="24" fill="#11151b" stroke="#22d3ee" stroke-width="3"/><text x="90" y="158" class="t" font-size="26">Host DRAM</text>
<rect x="90" y="195" width="400" height="76" rx="12" fill="#123442" stroke="#22d3ee"/><text x="110" y="225" class="t">point frame</text><text x="110" y="251" class="m">N×5 fp32 · producer slot</text>
